services:
  backend:
    build: ./backend
    container_name: ge-backend
    restart: always
    env_file:
      - ./backend/.env.production
    expose:
      - "8001"
    depends_on:
      - mongo
    volumes:
      - upload_data:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ge-api.rule=Host(`apps.geniuseducation.co.uk`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ge-api.entrypoints=websecure"
      - "traefik.http.routers.ge-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ge-api.loadbalancer.server.port=8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: https://apps.geniuseducation.co.uk
    container_name: ge-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ge-frontend.rule=Host(`apps.geniuseducation.co.uk`)"
      - "traefik.http.routers.ge-frontend.entrypoints=websecure"
      - "traefik.http.routers.ge-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ge-frontend.loadbalancer.server.port=80"

  mongo:
    image: mongo:7
    container_name: ge-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  upload_data:
